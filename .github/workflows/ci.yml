name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check analyzer/ insights/ shared/
      - run: ruff format --check analyzer/ insights/ shared/

  typecheck-scraper:
    name: Typecheck Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - run: npx tsc --noEmit
        working-directory: scraper

  typecheck-functions:
    name: Typecheck Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
        working-directory: functions
      - run: npx tsc --noEmit
        working-directory: functions

  test-scraper:
    name: Test Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - run: npm test
        working-directory: scraper

  test-functions:
    name: Test Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
        working-directory: functions
      - run: npm test
        working-directory: functions

  test-python:
    name: Test Python (Analyzer + Insights)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/
        working-directory: analyzer
      - run: python -m pytest tests/
        working-directory: insights
