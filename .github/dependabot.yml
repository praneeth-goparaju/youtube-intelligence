version: 2
updates:
  - package-ecosystem: npm
    directory: /scraper
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      all-npm-scraper:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      all-npm-functions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      all-pip:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      all-actions:
        patterns: ["*"]
